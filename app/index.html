<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TOTEM CRT — Player 1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
}
/*
  Cada TV: 640×480 (4:3). Grelha 2×2 = 1280×960; no ecrã 16:9/4K as células mostram barras (object-fit: contain).
*/
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: 'Press Start 2P', monospace;
  image-rendering: pixelated;
}
/*
  O conjunto 2×2 de TVs é 4:3 (1280×960).
  Num monitor 16:9 ou 4K: cabe inteiro com letterbox.
  max-width/height + aspect-ratio garante isso sem JavaScript.
*/
#dev-wrap {
  width: min(100vw, 100dvh * 4 / 3);
  height: min(100dvh, 100vw * 3 / 4);
  aspect-ratio: 4 / 3;
  flex-shrink: 0;
}
#output {
  width: 100vw;
  height: 100vh;
  display: block;
}
/* 4 TVs 640×480 (4:3) — contain evita esticar dentro da célula */
.dev-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  width: 100%;
  height: 100%;
  gap: 2px;
  background: #111;
}
.dev-grid canvas {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
  object-position: center;
  background: #050510;
}
.dev-label {
  position: absolute;
  color: #0ff;
  font-size: 8px;
  padding: 4px;
  background: rgba(0,0,0,0.8);
  pointer-events: none;
}
#timer-global {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #0ff;
  font-size: 16px;
  z-index: 100;
  text-shadow: 0 0 10px #0ff;
}
#debug-info {
  position: fixed;
  bottom: 10px;
  right: 10px;
  color: #444;
  font-size: 6px;
  z-index: 100;
}
</style>
</head>
<body>

<div id="timer-global"></div>

<div id="dev-wrap">
  <div class="dev-grid" id="dev-grid">
    <canvas id="tv4" width="640" height="480"></canvas>
    <canvas id="tv3" width="640" height="480"></canvas>
    <canvas id="tv2" width="640" height="480"></canvas>
    <canvas id="tv1" width="640" height="480"></canvas>
  </div>
</div>

<!-- Production mode: 1 canvas 4K composto (hidden in dev) -->
<canvas id="output" width="3840" height="2160" style="display:none;"></canvas>

<div id="debug-info"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
